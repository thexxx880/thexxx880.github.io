<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LzPlay</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .message-container {
            text-align: center;
            max-width: 480px;
            padding: 40px 30px;
            background: rgba(255,255,255,0.06);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        .icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 24px;
            background: rgba(239,68,68,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        p {
            font-size: 18px;
            opacity: .85;
            line-height: 1.5;
            margin-bottom: 22px;
        }

        .compatible {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .device {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 15px;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            opacity: .6;
            text-align: center;
            width: 100%;
        }
    </style>

    <!-- Bloqueo avanzado de herramientas de desarrollador (oficial y recomendado) -->
    <script disable-devtool-auto src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>
</head>
<body>

<div class="message-container">
    <div class="icon">📱</div>

    <h1>Aplicación no disponible<br>para este dispositivo</h1>

    <p id="mensaje">
        Esta aplicación únicamente está disponible para dispositivos Android.
    </p>

    <div class="compatible">
        <div class="device">✅ Android</div>
    </div>

    <p style="margin-top:25px;font-size:15px;opacity:.7;">
        Abre este enlace desde un teléfono o tablet Android.
    </p>
</div>

<div class="footer">
    Cinexia • Solo Android compatible
</div>
