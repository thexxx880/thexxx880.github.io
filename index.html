<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinexia - Redirección automática</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            display: none; /* Se muestra solo en PC */
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .message-container {
            text-align: center;
            max-width: 480px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        .icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 24px;
            background: rgba(239, 68, 68, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        p {
            font-size: 18px;
            opacity: 0.85;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .compatible {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .device {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            opacity: 0.6;
            text-align: center;
            width: 100%;
        }

        /* Efecto de partículas sutil */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
    </style>
</head>
<body>
    <!-- Mensaje que solo se muestra en PC / Windows / Linux / Mac -->
    <div class="message-container">
        <div class="icon">📱</div>
        <h1>Esta página no está disponible<br>para tu dispositivo</h1>
        <p>Dispositivos compatibles únicamente:</p>
        
        <div class="compatible">
            <div class="device">
                <span>🤖</span>
                <span>Android</span>
            </div>
            <div class="device">
                <span></span>
                <span>iPhone / iOS</span>
            </div>
        </div>

        <p style="margin-top: 30px; font-size: 15px; opacity: 0.7;">
            Por favor, abre este enlace desde tu celular Android o iPhone.
        </p>
    </div>

    <div class="footer">
        Cinexia • Solo móviles compatibles
    </div>

    <div class="background"></div>

    <script>
        // === DETECCIÓN DE DISPOSITIVO ===
        function detectarDispositivo() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;

            // 1. Android (cualquier navegador Android)
            if (/android/i.test(ua)) {
                console.log("✅ Dispositivo Android detectado → Redirigiendo...");
                window.location.href = "https://lzrdrz10.github.io/Cinexia.V.9.0/";
                return;
            }

            // 2. iOS (iPhone, iPad, iPod)
            if (/iPad|iPhone|iPod/i.test(ua) || 
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
                console.log("✅ Dispositivo iOS detectado → Redirigiendo...");
                window.location.href = "https://lzrdrz10.github.io/log";
                return;
            }

            // 3. Cualquier otro dispositivo (PC Windows, Linux, Mac, etc.)
            console.log("ℹ️  Dispositivo no compatible (PC) → Mostrando mensaje");
            document.body.style.display = "flex"; // Mostramos el mensaje bonito
        }

        // Ejecutar la detección inmediatamente
        window.onload = detectarDispositivo;

        // También lo ejecutamos por si acaso (seguridad extra)
        detectarDispositivo();
    </script>
</body>
</html>
